<article>
  <div class="fp-timeline-marker"><span>{% if include.number < 10 %}0{% endif %}{{ include.number }}</span></div>
  <a class="fp-journey-art" href="{{ include.page.url | prepend: site.baseurl }}" aria-label="Explore {{ include.page.title }}">
    <img src="{{ include.page.image | prepend: '/' | prepend: site.baseurl }}" alt="{{ include.page.image_alt | default: include.page.title }}">
  </a>
  <div class="fp-timeline-copy">
    <p class="fp-kicker">{{ include.page.project_number }} · {{ include.page.days }} · {{ include.page.status }}</p>
    <h2><a href="{{ include.page.url | prepend: site.baseurl }}">{{ include.page.title }}</a></h2>
    <p>{{ include.page.summary }}</p>
    <div class="fp-tags">
      {% for label in include.page.labels %}<span>{{ label }}</span>{% endfor %}
    </div>
    <a class="btn fp-project-open" href="{{ include.page.url | prepend: site.baseurl }}">Explore this milestone</a>
  </div>
</article>
