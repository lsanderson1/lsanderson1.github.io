---
layout: home
---

<article class="fp-project-reader fp-journey-reader">
  <div class="fp-project-reader-bar">
    <a class="btn" href="{{ '/unreal-journey/' | prepend: site.baseurl }}">← Unreal Engine Journey</a>
    <span>{{ page.project_number }} · {{ page.days }} · {{ page.status }}</span>
  </div>
  <header class="fp-project-reader-head fp-journey-reader-head">
    <p class="fp-kicker">{{ page.project_number }} · {{ page.days }} · {{ page.status }}</p>
    <h1>{{ page.title }}</h1>
    <p>{{ page.summary }}</p>
    <div class="fp-tags">
      {% for label in page.labels %}<span>{{ label }}</span>{% endfor %}
    </div>
    <img class="fp-project-cover" src="{{ page.image | prepend: '/' | prepend: site.baseurl }}" alt="{{ page.image_alt | default: page.title }}">
  </header>
  <div class="fp-project-reader-body fp-journey-reader-body">
    {{ content }}
  </div>
</article>
