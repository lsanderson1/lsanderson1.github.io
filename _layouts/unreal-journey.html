---
layout: home
---

<main style="background-color: var(--tf-page-bg-color)" class="bg-gradient py-4">
  <article class="container">
    <a href="{{ site.baseurl }}/unreal-journey/" class="d-inline-block mb-3">&larr; Back to Unreal Engine Journey</a>

    <header class="mb-4">
      <div class="d-flex flex-wrap justify-content-between align-items-start gap-3">
        <div>
          <p class="text-uppercase text-muted fw-bold mb-1">{{ page.project_number }} · {{ page.days }}</p>
          <h1 class="display-4 mb-2">{{ page.title }}</h1>
          <p class="lead mb-0">{{ page.summary }}</p>
        </div>
        <span class="badge bg-success fs-6">{{ page.status }}</span>
      </div>

      <div class="mt-3">
        {% for label in page.labels %}
          <span style="background-color: var(--tf-pill-bg)" class="badge rounded-pill">{{ label }}</span>
        {% endfor %}
      </div>
    </header>

    <img src="{{ site.baseurl }}/{{ page.image }}"
         class="img-fluid rounded border mb-4 w-100"
         alt="{{ page.image_alt | default: page.title }}">

    <div class="unreal-journey-content">
      {{ content }}
    </div>
  </article>
</main>
