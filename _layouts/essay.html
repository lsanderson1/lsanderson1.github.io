---
layout: home
---

<article class="fp-project-reader fp-essay-reader">
  <div class="fp-project-reader-bar">
    <a class="btn" href="{{ '/essays/' | prepend: site.baseurl }}">← All essays</a>
    <span>{{ page.date | date_to_string }}</span>
  </div>
  <header class="fp-project-reader-head fp-essay-reader-head">
    <p class="fp-kicker">{% for label in page.labels %}{{ label }}{% unless forloop.last %} · {% endunless %}{% endfor %}</p>
    <h1>{{ page.title }}</h1>
  </header>
  <div class="fp-project-reader-body fp-essay-reader-body">
    {{ content }}
  </div>
</article>
